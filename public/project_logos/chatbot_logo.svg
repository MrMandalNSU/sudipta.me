<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    
    <!-- Face / Screen Gradient -->
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>

    <!-- Eyes Glowing Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer Glassmorphic Border -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" stroke="rgba(255, 255, 255, 0.2)" stroke-width="8" />

  <!-- Robot Head / Chat Bubble Shape Group -->
  <g transform="translate(0, 10)">
    <!-- Antenna -->
    <rect x="248" y="90" width="16" height="50" rx="8" fill="#FFFFFF" opacity="0.9" />
    <circle cx="256" cy="78" r="16" fill="#22D3EE" filter="url(#glow)" />
    <!-- Signal Waves -->
    <path d="M 220 60 A 45 45 0 0 1 292 60" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.6" />
    <path d="M 200 40 A 70 70 0 0 1 312 40" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.3" />

    <!-- Main Head / Chat Base -->
    <!-- Curved Chat Bubble / Rounded Robot Head -->
    <path d="M 140 140
             H 372
             A 32 32 0 0 1 404 172
             V 290
             A 32 32 0 0 1 372 322
             H 290
             L 230 372
             V 322
             H 140
             A 32 32 0 0 1 108 290
             V 172
             A 32 32 0 0 1 140 140 Z" 
          fill="url(#screenGrad)" 
          stroke="rgba(255, 255, 255, 0.15)" 
          stroke-width="6" />

    <!-- Circuit tracks (RAG / Data nodes) on the screen background -->
    <path d="M 130 180 H 170 L 190 200" fill="none" stroke="#22D3EE" stroke-width="3" opacity="0.3" stroke-linecap="round" />
    <circle cx="130" cy="180" r="4" fill="#22D3EE" opacity="0.5" />
    <circle cx="190" cy="200" r="4" fill="#22D3EE" opacity="0.5" />

    <path d="M 382 180 H 342 L 322 200" fill="none" stroke="#818CF8" stroke-width="3" opacity="0.3" stroke-linecap="round" />
    <circle cx="382" cy="180" r="4" fill="#818CF8" opacity="0.5" />
    <circle cx="322" cy="200" r="4" fill="#818CF8" opacity="0.5" />

    <!-- Glowing Screen Face Border -->
    <rect x="130" y="160" width="252" height="120" rx="16" fill="none" stroke="#22D3EE" stroke-width="2" opacity="0.15" />

    <!-- Eyes (Cute Glowing LEDs) -->
    <g filter="url(#glow)">
      <!-- Left Eye -->
      <circle cx="200" cy="220" r="18" fill="#22D3EE" />
      <circle cx="204" cy="216" r="6" fill="#FFFFFF" />

      <!-- Right Eye -->
      <circle cx="312" cy="220" r="18" fill="#22D3EE" />
      <circle cx="316" cy="216" r="6" fill="#FFFFFF" />
    </g>

    <!-- Happy Mouth Curve -->
    <path d="M 236 260 Q 256 275 276 260" fill="none" stroke="#22D3EE" stroke-width="5" stroke-linecap="round" filter="url(#glow)" />
  </g>
</svg>
