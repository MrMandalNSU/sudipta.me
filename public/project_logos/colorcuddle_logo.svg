<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <linearGradient id="gloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
  </defs>
  <circle cx="16" cy="16" r="14" fill="#06050b" />
  <circle cx="16" cy="16" r="12" fill="url(#neonGradient)" filter="url(#glow)" />
  <circle cx="16" cy="16" r="12" fill="none" stroke="#000000" stroke-opacity="0.4" stroke-width="0.8" />
  <ellipse cx="16" cy="9.5" rx="5" ry="2.5" fill="url(#gloss)" />
</svg>
