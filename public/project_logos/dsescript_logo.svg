<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="webGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  
  <!-- Radial Lines -->
  <line x1="16" y1="16" x2="28" y2="16" stroke="url(#webGrad)" stroke-width="0.8" opacity="0.8" />
  <line x1="16" y1="16" x2="24.5" y2="24.5" stroke="url(#webGrad)" stroke-width="0.8" opacity="0.8" />
  <line x1="16" y1="16" x2="16" y2="28" stroke="url(#webGrad)" stroke-width="0.8" opacity="0.8" />
  <line x1="16" y1="16" x2="7.5" y2="24.5" stroke="url(#webGrad)" stroke-width="0.8" opacity="0.8" />
  <line x1="16" y1="16" x2="4" y2="16" stroke="url(#webGrad)" stroke-width="0.8" opacity="0.8" />
  <line x1="16" y1="16" x2="7.5" y2="7.5" stroke="url(#webGrad)" stroke-width="0.8" opacity="0.8" />
  <line x1="16" y1="16" x2="16" y2="4" stroke="url(#webGrad)" stroke-width="0.8" opacity="0.8" />
  <line x1="16" y1="16" x2="24.5" y2="7.5" stroke="url(#webGrad)" stroke-width="0.8" opacity="0.8" />

  <!-- Web Rings -->
  <!-- Ring 1 (Inner) -->
  <path d="M20,16 Q18.5,15 18.8,13.2 Q17,13.2 16,12 Q15,13.2 13.2,13.2 Q13.2,15 12,16 Q13.2,17 13.2,18.8 Q15,18.8 16,20 Q17,18.8 18.8,18.8 Q18.5,17 20,16 Z" fill="none" stroke="url(#webGrad)" stroke-width="0.8" filter="url(#glow)" />
  
  <!-- Ring 2 (Middle) -->
  <path d="M24,16 Q21,14 21.7,10.3 Q18,10.3 16,8 Q14,10.3 10.3,10.3 Q10.3,14 8,16 Q10.3,18 10.3,21.7 Q14,21.7 16,24 Q18,21.7 21.7,21.7 Q21,18 24,16 Z" fill="none" stroke="url(#webGrad)" stroke-width="1.0" filter="url(#glow)" />
  
  <!-- Ring 3 (Outer) -->
  <path d="M28,16 Q24.5,13 24.5,7.5 Q19,7.5 16,4 Q13,7.5 7.5,7.5 Q7.5,13 4,16 Q7.5,19 7.5,24.5 Q13,24.5 16,28 Q19,24.5 24.5,24.5 Q24.5,19 28,16 Z" fill="none" stroke="url(#webGrad)" stroke-width="1.2" filter="url(#glow)" />

  <!-- Center spider / node core -->
  <circle cx="16" cy="16" r="1.5" fill="#ffffff" filter="url(#glow)" />
</svg>
