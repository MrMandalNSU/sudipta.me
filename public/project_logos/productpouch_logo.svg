<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="sackGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#dfa873" />
      <stop offset="40%" stop-color="#ca8e54" />
      <stop offset="100%" stop-color="#955e2d" />
    </linearGradient>
    <linearGradient id="sackHighlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.2" />
    </linearGradient>
    <filter id="pouchShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-color="#000000" flood-opacity="0.4" />
    </filter>
  </defs>

  
  <!-- Sack Group with shadow -->
  <g filter="url(#pouchShadow)">
    <!-- Ruffle (Top) -->
    <path d="M12,12 C10,9.5 11,7 13.5,8 C14.8,8.5 15.3,9.2 16,8.8 C16.7,9.2 17.2,8.5 18.5,8 C21,7 22,9.5 20,12 Z" fill="url(#sackGrad)" />
    
    <!-- Body -->
    <path d="M12,12 C9.2,14 7.8,19 7.8,22 C7.8,25.2 11.5,26 16,26 C20.5,26 24.2,25.2 24.2,22 C24.2,19 22.8,14 20,12 Z" fill="url(#sackGrad)" />
    
    <!-- Shading / Texture overlays -->
    <path d="M12,12 C9.2,14 7.8,19 7.8,22 C7.8,25.2 11.5,26 16,26 C20.5,26 24.2,25.2 24.2,22 C24.2,19 22.8,14 20,12 Z" fill="url(#sackHighlight)" opacity="0.4" />
    
    <!-- Tie Cord -->
    <!-- Neck wrap line -->
    <path d="M11.6,12.2 C13,12.8 19,12.8 20.4,12.2" stroke="#1c1917" stroke-width="1.2" stroke-linecap="round" fill="none" />
    <!-- Bow Loops -->
    <path d="M16,12.2 C13.5,10.2 13.5,12.5 16,12.2" stroke="#1c1917" stroke-width="1.2" stroke-linecap="round" fill="none" />
    <path d="M16,12.2 C18.5,10.2 18.5,12.5 16,12.2" stroke="#1c1917" stroke-width="1.2" stroke-linecap="round" fill="none" />
    <!-- Tails -->
    <path d="M16,12.2 C15.2,14 14.3,15.5 14.7,17.5" stroke="#1c1917" stroke-width="1.2" stroke-linecap="round" fill="none" />
    <path d="M16,12.2 C16.8,14.2 17.5,15 17,17" stroke="#1c1917" stroke-width="1.2" stroke-linecap="round" fill="none" />
  </g>
</svg>
