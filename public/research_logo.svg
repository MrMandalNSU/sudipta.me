<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1877F2" />
      <stop offset="60%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <linearGradient id="glass-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05" />
    </linearGradient>
  </defs>

  <!-- Circular Badge Background with subtle border -->
  <circle cx="50" cy="50" r="47" fill="url(#bg-gradient)" />
  <circle cx="50" cy="50" r="47" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.6" />

  <!-- Flask (Research/Science representation) -->
  <!-- Outline -->
  <path d="M 55,22 H 69 V 40 L 82,70 A 6,6 0 0 1 76,78 H 48 A 6,6 0 0 1 42,72 L 55,40 Z" 
        fill="url(#glass-gradient)" 
        stroke="#ffffff" 
        stroke-width="2.5" 
        stroke-linejoin="round" 
        stroke-linecap="round" />
  
  <!-- Beaker Lip -->
  <path d="M 53,22 H 71" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
  
  <!-- Liquid in Flask -->
  <path d="M 47,60 H 77 L 80,68 A 4,4 0 0 1 76,73 H 48 A 4,4 0 0 1 44,68 Z" 
        fill="#ffffff" 
        fill-opacity="0.3" />

  <!-- Bubbles rising from Flask -->
  <circle cx="59" cy="50" r="2" fill="#ffffff" fill-opacity="0.6" />
  <circle cx="65" cy="45" r="1.5" fill="#ffffff" fill-opacity="0.6" />
  <circle cx="61" cy="35" r="2.5" fill="#ffffff" fill-opacity="0.8" />
  <circle cx="57" cy="30" r="1" fill="#ffffff" fill-opacity="0.5" />

  <!-- Magnifying Glass (Opinion Mining/Search representation) -->
  <!-- Handle -->
  <line x1="28" y1="64" x2="16" y2="76" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" />
  <!-- Lens outer ring -->
  <circle cx="38" cy="52" r="18" fill="#1877F2" stroke="#ffffff" stroke-width="3.5" />
  <!-- Subtle lens highlight/gloss -->
  <path d="M 23,52 A 15,15 0 0 1 38,37" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" fill="none" stroke-opacity="0.4" />

  <!-- Facebook style lowercase 'f' inside the lens -->
  <path d="M 37,62 V 50 H 33 V 45 H 37 V 42 A 5,5 0 0 1 42,37 H 46 V 42 H 43.5 A 1.5,1.5 0 0 0 42,43.5 V 45 H 46.5 L 46,50 H 42 V 62 Z" 
        fill="#ffffff" />
</svg>
